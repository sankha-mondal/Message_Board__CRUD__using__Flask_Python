{% extends 'base.html' %}
{% block content %}

<h2>All Posts</h2>

{% for post in posts %}
    <div class="card">
        <h3>{{ post.title }}</h3>
        <p>{{ post.content }}</p>
        <a href="/edit/{{ post.id }}">Edit</a>
        <a href="/delete/{{ post.id }}">Delete</a>
    </div>
{% endfor %}

{% endblock %}
