{% extends 'base.html' %}
{% block content %}

<h2>Edit Post</h2>

<form method="POST">
    <input type="text" name="title" value="{{ post.title }}"><br><br>
    <textarea name="content">{{ post.content }}</textarea><br><br>

    <button type="submit">Save</button>
    <button type="submit" name="publish">Publish</button>
</form>

{% endblock %}
